<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    
    <p id="product"></p>
    
    
    
    
    <script>
      let num1 = -2;
      let num2 = 3;
      let num3 = 4;
      let product = num1 * num2 * num3;

      if (product > 0) {
        document.getElementById("product").innerHTML = product;
      } else {
        document.getElementById("product").innerHTML = product;
      }
    </script>
  </body>
</html>
